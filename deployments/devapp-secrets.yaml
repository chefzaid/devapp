---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: devapp-db-credentials
  namespace: devapp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: devapp-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: infrastructure/postgres
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: infrastructure/postgres
        property: password
